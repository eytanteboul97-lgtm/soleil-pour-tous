<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="12" fill="#060B17" />
  <defs>
    <linearGradient id="neutral" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.55" />
    </linearGradient>
    <linearGradient id="accent" x1="24" y1="6" x2="24" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE9C7" />
      <stop offset="55%" stop-color="#FFA51E" />
      <stop offset="100%" stop-color="#F2680A" />
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.4" />
    </filter>
    <filter id="lift" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.6" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <line x1="24" y1="17" x2="24" y2="6" stroke="#FFA51E" stroke-width="6.5" stroke-linecap="round" filter="url(#glow)" opacity="0.75" />
  <g stroke-linecap="round" stroke-width="6.5" filter="url(#lift)">
    <line x1="24" y1="17" x2="24" y2="6" stroke="url(#accent)" />
    <line x1="30.06" y1="20.5" x2="39.59" y2="15" stroke="url(#neutral)" />
    <line x1="30.06" y1="27.5" x2="39.59" y2="33" stroke="url(#neutral)" />
    <line x1="24" y1="31" x2="24" y2="42" stroke="url(#neutral)" />
    <line x1="17.94" y1="27.5" x2="8.41" y2="33" stroke="url(#neutral)" />
    <line x1="17.94" y1="20.5" x2="8.41" y2="15" stroke="url(#neutral)" />
  </g>
</svg>
